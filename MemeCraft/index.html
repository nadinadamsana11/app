<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeCraft | Free Online Meme & Image Text Editor</title>
    <meta name="description" content="A premium web tool to generate custom memes, overlay text on images, and download high-quality results. Completely free to use.">
    <!-- SEO Tags -->
    <meta name="keywords" content="meme maker, text overlay, edit image text, free meme generator, online meme creator, memecraft">
    <meta property="og:title" content="MemeCraft - Free Meme Maker">
    <meta property="og:description" content="Generate beautiful memes and add text overlays to images quickly with our premium web interface.">
    <meta property="og:type" content="website">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1><i class="ph ph-magic-wand"></i> MemeCraft</h1>
            <p>Upload, customize, and download your perfect meme.</p>
        </header>

        <main class="main-content">
            <!-- Canvas Preview Area -->
            <section class="preview-section">
                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="memeCanvas"></canvas>
                    <div class="placeholder-content" id="placeholder">
                        <i class="ph ph-image"></i>
                        <p>Upload an image to start</p>
                    </div>
                </div>
            </section>

            <!-- Controls Area -->
            <section class="controls-section glass-panel">
                <h2>Settings</h2>
                
                <div class="control-group">
                    <label for="imageUpload" class="file-upload-btn">
                        <i class="ph ph-upload-simple"></i> Choose Image
                    </label>
                    <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/webp" hidden>
                </div>

                <div class="flex-row">
                    <div class="control-group half" style="margin-bottom: 0;">
                        <label for="fontFamily">Font</label>
                        <select id="fontFamily" class="select-input" style="width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 8px; padding: 0.8rem 1rem; color: var(--text-main); font-family: inherit; font-size: 1rem; cursor: pointer;">
                            <option value="Impact" style="background: var(--bg-secondary); color: var(--text-main);">Impact</option>
                            <option value="Arial" style="background: var(--bg-secondary); color: var(--text-main);">Arial Black</option>
                            <option value="Comic Sans MS" style="background: var(--bg-secondary); color: var(--text-main);">Comic Sans MS</option>
                        </select>
                    </div>
                    <div class="control-group half" style="margin-bottom: 0; display: flex; align-items: center; justify-content: flex-end;">
                        <label style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;"><input type="checkbox" id="uppercaseToggle" checked style="accent-color: var(--accent-color); width: 18px; height: 18px;"> All Caps</label>
                    </div>
                </div>

                <div class="text-config-panel" style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                    <div class="control-group">
                        <label for="topText">Top Text</label>
                        <input type="text" id="topText" placeholder="Enter top text...">
                    </div>
                    <div class="flex-row">
                        <div class="control-group half">
                            <label>Pos X (<span id="topTextXDisplay">50</span>%)</label>
                            <input type="range" id="topTextX" min="0" max="100" value="50">
                        </div>
                        <div class="control-group half">
                            <label>Pos Y (<span id="topTextYDisplay">4</span>%)</label>
                            <input type="range" id="topTextY" min="0" max="100" value="4">
                        </div>
                    </div>
                </div>

                <div class="text-config-panel" style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                    <div class="control-group">
                        <label for="bottomText">Bottom Text</label>
                        <input type="text" id="bottomText" placeholder="Enter bottom text...">
                    </div>
                    <div class="flex-row">
                        <div class="control-group half">
                            <label>Pos X (<span id="bottomTextXDisplay">50</span>%)</label>
                            <input type="range" id="bottomTextX" min="0" max="100" value="50">
                        </div>
                        <div class="control-group half">
                            <label>Pos Y (<span id="bottomTextYDisplay">96</span>%)</label>
                            <input type="range" id="bottomTextY" min="0" max="100" value="96">
                        </div>
                    </div>
                </div>

                <div class="flex-row">
                    <div class="control-group half">
                        <label for="textColor">Text Color</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="textColor" value="#ffffff">
                            <span id="textColorHex" class="color-hex">#ffffff</span>
                        </div>
                    </div>
                    <div class="control-group half">
                        <label for="borderColor">Outline Color</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="borderColor" value="#000000">
                            <span id="borderColorHex" class="color-hex">#000000</span>
                        </div>
                    </div>
                </div>

                <div class="flex-row">
                    <div class="control-group half">
                        <label for="fontSize">Font Size</label>
                        <div class="slider-wrapper">
                            <input type="range" id="fontSize" min="20" max="120" value="48">
                            <span id="fontSizeDisplay">48px</span>
                        </div>
                    </div>
                    <div class="control-group half">
                        <label for="outlineWidth">Outline Width</label>
                        <div class="slider-wrapper">
                            <input type="range" id="outlineWidth" min="0" max="25" value="5">
                            <span id="outlineWidthDisplay">5</span>
                        </div>
                    </div>
                </div>

                <button class="primary-btn" id="downloadBtn" disabled>
                    <i class="ph ph-download-simple"></i> Download Meme
                </button>
            </section>
        </main>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
